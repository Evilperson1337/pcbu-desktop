name: Setup Windows Build Environment
description: Installs Qt and vcpkg dependencies for Windows x64 and arm64 builds.

inputs:
  qt-version:
    description: Qt version to install.
    required: true
  arch:
    description: Target architecture: x64 or arm64.
    required: true
  qt-cache-prefix:
    description: Cache prefix for Qt installation.
    required: true
  vcpkg-cache-key:
    description: Cache key for vcpkg artifacts.
    required: true
  github-token:
    description: GitHub token for vcpkg action.
    required: true

runs:
  using: composite
  steps:
    - name: Workaround Qt install bug for arm64
      if: inputs.arch == 'arm64'
      shell: pwsh
      run: |
        $target = "C:\Qt\${{ inputs.qt-version }}\msvc2022_arm64\bin"
        New-Item -Path $target -ItemType Directory -Force | Out-Null
        Set-Location $target
        @"
        @echo off
        \Users\qt\work\install\bin\qmake6.exe -qtconf "%~dp0\target_qt.conf" %*
        "@ | Out-File -FilePath "qmake.bat" -Encoding ascii -Force
        @"
        @echo off
        \Users\qt\work\install\bin\qmake6.exe -qtconf "%~dp0\target_qt.conf" %*
        "@ | Out-File -FilePath "qmake6.bat" -Encoding ascii -Force
        @"
        @echo off
        \Users\qt\work\install\bin\qtpaths6.exe -qtconf "%~dp0\target_qt.conf" %*
        "@ | Out-File -FilePath "qtpaths.bat" -Encoding ascii -Force
        @"
        @echo off
        \Users\qt\work\install\bin\qtpaths6.exe -qtconf "%~dp0\target_qt.conf" %*
        "@ | Out-File -FilePath "qtpaths6.bat" -Encoding ascii -Force

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        dir: "C:/"
        version: ${{ inputs.qt-version }}
        host: "windows"
        target: "desktop"
        arch: ${{ inputs.arch == 'x64' && 'win64_msvc2022_64' || 'win64_msvc2022_arm64_cross_compiled' }}
        cache: "true"
        cache-key-prefix: ${{ inputs.qt-cache-prefix }}

    - name: Build vcpkg dependencies
      uses: johnwason/vcpkg-action@v7
      with:
        pkgs: openssl
        triplet: ${{ inputs.arch == 'x64' && 'x64-windows-static' || 'arm64-windows-static' }}
        token: ${{ inputs.github-token }}
        cache-key: ${{ inputs.vcpkg-cache-key }}
