name: Build All
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  QT_VERSION: 6.10.2

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Windows x64 build environment
        uses: ./.github/actions/setup-windows-build
        with:
          qt-version: "${{env.QT_VERSION}}"
          arch: x64
          qt-cache-prefix: "qt-x64"
          vcpkg-cache-key: "vcpkg-x64"
          github-token: ${{github.token}}

      - name: Build x64
        run: bash -c "cd pkg && chmod +x build-desktop.sh && ARCH=x64 QT_BASE_DIR=C:/Qt/${{env.QT_VERSION}} ./build-desktop.sh"
        env:
          VCPKG_ROOT: ${{github.workspace}}/vcpkg

      - name: Build service/rest x64 bundle
        run: bash -c "cd pkg && chmod +x build-service-rest.sh && ARCH=x64 QT_BASE_DIR=C:/Qt/${{env.QT_VERSION}} ./build-service-rest.sh"
        env:
          VCPKG_ROOT: ${{github.workspace}}/vcpkg

      - name: Smoke test service x64
        uses: ./.github/actions/run-service-rest-smoke
        with:
          service-exe: pkg/build-service-rest/desktop/Release/pcbu_unlock_service.exe
          unlockctl-exe: pkg/build-service-rest/desktop/Release/pcbu_unlockctl.exe
          mode: pipe

      - name: Smoke test REST x64
        uses: ./.github/actions/run-service-rest-smoke
        with:
          service-exe: pkg/build-service-rest/desktop/Release/pcbu_unlock_service.exe
          unlockctl-exe: pkg/build-service-rest/desktop/Release/pcbu_unlockctl.exe
          mode: rest
          api-token: ci-loopback-token

      - name: Verify combined x64 bundles
        shell: pwsh
        run: |
          Write-Host 'Verification delegated to shared zip verification action in split workflows and helper script.'
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-ServiceRest-x64.zip" -Destination "pkg/build-service-rest/verify-all-x64" -RequiredFiles "pcbu_unlock_service.exe","pcbu_unlockctl.exe","win-pcbiounlock.dll"
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-ServiceUnlock-x64.zip" -Destination "pkg/build-service-rest/verify-service-x64" -RequiredFiles "pcbu_unlock_service.exe"
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-RestUnlock-x64.zip" -Destination "pkg/build-service-rest/verify-rest-x64" -RequiredFiles "pcbu_unlockctl.exe"
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-PCBioUnlock-x64.zip" -Destination "pkg/build-service-rest/verify-companion-x64" -RequiredFiles "win-pcbiounlock.dll"

      - name: Upload x64
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/build/PCBioUnlock-Setup-x64.exe
            pkg/build-service-rest/PCBioUnlock-ServiceRest-x64.zip
            pkg/build-service-rest/PCBioUnlock-ServiceUnlock-x64.zip
            pkg/build-service-rest/PCBioUnlock-RestUnlock-x64.zip
            pkg/build-service-rest/PCBioUnlock-PCBioUnlock-x64.zip

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Windows arm64 build environment
        uses: ./.github/actions/setup-windows-build
        with:
          qt-version: "${{env.QT_VERSION}}"
          arch: arm64
          qt-cache-prefix: "qt-arm64"
          vcpkg-cache-key: "vcpkg-arm64"
          github-token: ${{github.token}}

      - name: Build arm64
        run: bash -c "cd pkg && rm -Rf ./build/ && ARCH=arm64 QT_BASE_DIR=C:/Qt/${{env.QT_VERSION}} ./build-desktop.sh"
        env:
          VCPKG_ROOT: ${{github.workspace}}/vcpkg

      - name: Build service/rest arm64 bundle
        run: bash -c "cd pkg && chmod +x build-service-rest.sh && rm -Rf ./build-service-rest/ && ARCH=arm64 QT_BASE_DIR=C:/Qt/${{env.QT_VERSION}} ./build-service-rest.sh"
        env:
          VCPKG_ROOT: ${{github.workspace}}/vcpkg

      - name: Smoke test service arm64
        uses: ./.github/actions/run-service-rest-smoke
        with:
          service-exe: pkg/build-service-rest/desktop/Release/pcbu_unlock_service.exe
          unlockctl-exe: pkg/build-service-rest/desktop/Release/pcbu_unlockctl.exe
          mode: pipe

      - name: Smoke test REST arm64
        uses: ./.github/actions/run-service-rest-smoke
        with:
          service-exe: pkg/build-service-rest/desktop/Release/pcbu_unlock_service.exe
          unlockctl-exe: pkg/build-service-rest/desktop/Release/pcbu_unlockctl.exe
          mode: rest
          api-token: ci-loopback-token

      - name: Verify combined arm64 bundles
        shell: pwsh
        run: |
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-ServiceRest-arm64.zip" -Destination "pkg/build-service-rest/verify-all-arm64" -RequiredFiles "pcbu_unlock_service.exe","pcbu_unlockctl.exe","win-pcbiounlock.dll"
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-ServiceUnlock-arm64.zip" -Destination "pkg/build-service-rest/verify-service-arm64" -RequiredFiles "pcbu_unlock_service.exe"
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-RestUnlock-arm64.zip" -Destination "pkg/build-service-rest/verify-rest-arm64" -RequiredFiles "pcbu_unlockctl.exe"
          & .\pkg\win\verify-zip-contents.ps1 -Zip "pkg/build-service-rest/PCBioUnlock-PCBioUnlock-arm64.zip" -Destination "pkg/build-service-rest/verify-companion-arm64" -RequiredFiles "win-pcbiounlock.dll"

      - name: Upload arm64
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/build/PCBioUnlock-Setup-arm64.exe
            pkg/build-service-rest/PCBioUnlock-ServiceRest-arm64.zip
            pkg/build-service-rest/PCBioUnlock-ServiceUnlock-arm64.zip
            pkg/build-service-rest/PCBioUnlock-RestUnlock-arm64.zip
            pkg/build-service-rest/PCBioUnlock-PCBioUnlock-arm64.zip

  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build docker
        run: bash -c "cd ${{github.workspace}}/pkg/linux && chmod +x docker-build.sh && ARCH=x64 ./docker-build.sh"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/build/PCBioUnlock-x64.AppImage

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build docker
        run: bash -c "cd ${{github.workspace}}/pkg/linux && chmod +x docker-build.sh && ARCH=arm64 ./docker-build.sh"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/build/PCBioUnlock-arm64.AppImage

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Prepare Qt
        run: sudo chmod 777 /opt
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          dir: "/opt"
          version: "${{env.QT_VERSION}}"
          host: "mac"
          target: "desktop"
          arch: "clang_64"
          cache: "true"

      - name: Build
        run: bash -c "cd pkg && rm -Rf ./build/ && ARCH=arm64 QT_BASE_DIR=/opt/Qt/${{env.QT_VERSION}} CI_BUILD=1 ./build-desktop.sh"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/build/PCBioUnlock-arm64.dmg
